name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Restrict permissions for GITHUB_TOKEN for security
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true

      - name: Run golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
          golangci-lint run --timeout=5m

  test:
    name: Test & Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Run Tests
        # Added -race to detect data races and -cover for coverage
        run: go test -v -race -cover ./...

      - name: Cross-Platform Build Check
        # Ensure the code compiles on all target OS/Arch combinations without breaking
        run: |
          GOOS=linux GOARCH=amd64 go build -o /dev/null .
          GOOS=linux GOARCH=arm64 go build -o /dev/null .
          GOOS=windows GOARCH=amd64 go build -o /dev/null .
          GOOS=darwin GOARCH=amd64 go build -o /dev/null .
          GOOS=darwin GOARCH=arm64 go build -o /dev/null .
